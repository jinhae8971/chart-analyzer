name: Daily Pipeline

# 영길님 관심 종목에 대해 매일 아침 자동으로:
#   1. trendline-detector + backtest-lab를 sibling으로 clone
#   2. 통합 파이프라인 실행 (검출 + 차트 + AI + 백테스트)
#   3. 결과를 Telegram으로 발송
#   4. JSON/PNG를 artifact로 보관

on:
  schedule:
    # 매일 KST 08:00 (UTC 23:00 전일) 실행 — 미국 장마감 후, KST 아침
    - cron: '0 23 * * 1-5'    # Mon-Fri (장 열리는 요일만)
  workflow_dispatch:
    inputs:
      tickers:
        description: '티커 (콤마 구분)'
        required: false
        default: 'NVDA,AAPL,MSFT,SPY,QQQ'
      days:
        description: '검출 lookback 일수'
        required: false
        default: '180'
      chart_type:
        description: '차트 타입'
        required: false
        default: 'standard'
        type: choice
        options: ['standard', 'raindrop', 'multitf']
      backtest_strategy:
        description: '백테스트 전략'
        required: false
        default: 'elliott_w3'
        type: choice
        options: ['elliott_w3', 'ma_golden', 'rsi_oversold', 'none']
      analysis_type:
        description: 'AI 분석 타입'
        required: false
        default: 'elliott'
        type: choice
        options: ['elliott', 'trend', 'support_resistance', 'none']

permissions:
  contents: read

jobs:
  run-pipeline:
    name: "Run integrated pipeline"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout chart-analyzer
        uses: actions/checkout@v4
        with:
          path: chart-analyzer

      - name: Checkout trendline-detector (sibling)
        uses: actions/checkout@v4
        with:
          repository: jinhae8971/trendline-detector
          path: trendline-detector

      - name: Checkout backtest-lab (sibling)
        uses: actions/checkout@v4
        with:
          repository: jinhae8971/backtest-lab
          path: backtest-lab

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: chart-analyzer
        run: |
          pip install -r requirements.txt
          pip install -r ../trendline-detector/requirements.txt
          pip install -r ../backtest-lab/requirements.txt

      - name: "Resolve inputs (manual vs scheduled)"
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tickers=${{ inputs.tickers }}"                      >> "$GITHUB_OUTPUT"
            echo "days=${{ inputs.days }}"                            >> "$GITHUB_OUTPUT"
            echo "chart=${{ inputs.chart_type }}"                     >> "$GITHUB_OUTPUT"
            echo "backtest=${{ inputs.backtest_strategy }}"           >> "$GITHUB_OUTPUT"
            echo "analysis=${{ inputs.analysis_type }}"               >> "$GITHUB_OUTPUT"
          else
            # 스케줄 실행 기본값
            echo "tickers=NVDA,AAPL,MSFT,SPY,QQQ"                     >> "$GITHUB_OUTPUT"
            echo "days=180"                                            >> "$GITHUB_OUTPUT"
            echo "chart=standard"                                      >> "$GITHUB_OUTPUT"
            echo "backtest=elliott_w3"                                 >> "$GITHUB_OUTPUT"
            echo "analysis=elliott"                                    >> "$GITHUB_OUTPUT"
          fi

      - name: Run integrated pipeline
        working-directory: chart-analyzer
        env:
          CHART_ANALYZER_SIBLING_PATH: ${{ github.workspace }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m src.pipeline \
            --ticker "${{ steps.cfg.outputs.tickers }}" \
            --days   "${{ steps.cfg.outputs.days }}" \
            --chart  "${{ steps.cfg.outputs.chart }}" \
            --analysis "${{ steps.cfg.outputs.analysis }}" \
            --backtest "${{ steps.cfg.outputs.backtest }}" \
            --output-dir output/pipeline \
            --telegram

      - name: Upload pipeline outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_number }}
          path: |
            chart-analyzer/output/pipeline/
          retention-days: 14

      - name: "On failure — Telegram alert"
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="⚠️ Daily Pipeline 실행 실패%0A%0A"
          MSG="${MSG}Run: ${{ github.run_id }}%0A"
          MSG="${MSG}URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" || true
